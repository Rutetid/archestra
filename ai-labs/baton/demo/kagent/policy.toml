# baton-proxy policy for the kagent demo.
#
# The proxy forwards to OpenRouter and gates the agent's k8s tool calls. Only
# the tools this scenario touches are annotated; every other kagent tool is
# unregistered and passes through — gradual adoption, and with no authorities
# registered an unprovable flow simply fails closed.

upstream_base_url = "https://openrouter.ai/api/v1"

# The user's turns default to trusted, so a clean investigation reaches the
# guarded sinks; the injection blocks them by tainting the flow suspicious. Add
# a `[contracts.user]` block only to change that (e.g. `trust = "suspicious"`
# for a public-facing agent) or to use audience rules.

# --- Injection vector: pod logs are third-party text. --------------------------
[[contracts.tool]]
name = "k8s_get_pod_logs"
output = { trust = "suspicious" }

# --- Trusted readers: pure cluster state, no third-party text. -----------------
[[contracts.tool]]
name = "k8s_get_resources"
output = { trust = "trusted" }

[[contracts.tool]]
name = "k8s_describe_resource"
output = { trust = "trusted" }

# --- Guarded sinks: a mutation may only run from a trusted flow. ---------------
# A flow tainted by suspicious log output fails this bar and is blocked.
[[contracts.tool]]
name = "k8s_delete_resource"
requires = { trust = "trusted" }

[[contracts.tool]]
name = "k8s_apply_manifest"
requires = { trust = "trusted" }

[[contracts.tool]]
name = "k8s_patch_resource"
requires = { trust = "trusted" }
